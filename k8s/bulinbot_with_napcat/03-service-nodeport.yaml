apiVersion: v1
kind: Service
metadata:
  name: bulinbot-service-nodeport
  namespace: bulinbot-ns
  labels:
    app: bulinbot-stack
spec:
  type: NodePort
  selector:
    app: bulinbot-stack
  ports:
    - name: napcat-web
      port: 6099
      targetPort: 6099
      # nodePort: 30099 # Optional: Specify a fixed NodePort if needed, otherwise remove this line
    - name: bulinbot-web
      port: 6185
      targetPort: 6185
      # nodePort: 30185 # Optional: Specify a fixed NodePort if needed, otherwise remove this line